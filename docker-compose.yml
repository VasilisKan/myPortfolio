services:
  vue-app:
    build:
      context: .
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://api.kanellos.me}
        VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID}
        VITE_EMAILJS_TEMPLATE_ID: ${VITE_EMAILJS_TEMPLATE_ID}
        VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY}
    image: portfolio-frontend:latest
    container_name: portfolio_frontend
    restart: always
    # NPM (running on the host) terminates TLS and proxies
    # kanellos.me / www.kanellos.me -> http://10.10.100.95:8090
    ports:
      - "8090:80"
